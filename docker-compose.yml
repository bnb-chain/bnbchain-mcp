version: '3.8'

services:
  # BNB Chain MCP Service - STDIO Mode
  bnbchain-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bnbchain-mcp-stdio
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - LOGLEVEL=info
    # STDIO mode doesn't need port mapping
    # Interact with container via docker exec or other methods
    networks:
      - bnbchain-network
    profiles:
      - stdio

  # BNB Chain MCP Service - SSE Mode
  bnbchain-mcp-sse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bnbchain-mcp-sse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOGLEVEL=info
    command: ["node", "dist/index.js", "--sse"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bnbchain-network
    profiles:
      - sse

  # Development Mode Service
  bnbchain-mcp-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bnbchain-mcp-dev
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./bun.lockb:/app/bun.lockb:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - LOGLEVEL=debug
    command: ["bun", "run", "dev:sse"]
    networks:
      - bnbchain-network
    profiles:
      - dev

networks:
  bnbchain-network:
    driver: bridge 