name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR with focus on the following areas specific to this project:

            1. **Confirmation flow integrity**
               - Transfer and payment tools must return a `confirmToken` + preview object and NOT execute immediately, unless `skipConfirmation: true` is explicitly passed or `BNBCHAIN_MCP_SKIP_TRANSFER_CONFIRMATION=true` is set.
               - `pendingTransferStore` entries must expire after 5 minutes and be consumed on first use — check for replay vulnerabilities.
               - Any new write tool that moves funds must plug into `src/confirm/` — not bypass it.

            2. **Private key and secret safety**
               - `privateKey`, mnemonics, and signed transactions must never appear in logs (any level), error messages, tool output, or previews.
               - All MCP tool inputs must be validated with a Zod schema at the tool boundary (`src/evm/modules/*/tools.ts` or `src/gnfd/tools/*.ts`). No `any`-typed inputs passed directly to viem or the Greenfield SDK.
               - `.env` files and real credentials must not be committed.

            3. **Viem client and chain lookup patterns**
               - Viem `PublicClient` and `WalletClient` instances must be retrieved from the cache in `src/evm/services/clients.ts`. Flag any `createPublicClient` / `createWalletClient` calls outside that file.
               - Chain resolution must use `chainMap` (by chain ID) or `networkNameMap` (by name string) from `src/evm/chains.ts` — no hardcoded chain config objects.

            4. **MCP tool registration and structure**
               - New MCP tools must be registered via a `register*()` function that is called in `src/server/base.ts`. Flag tools wired up inline or outside this pattern.
               - Zod input schemas must be defined at the tool layer, not inline in business logic.
               - Tools with no parameters must use `.update({ paramsSchema: {} })` — not the 3-arg `server.tool(name, description, handler)` overload (which omits `inputSchema` entirely due to an SDK `isZodRawShape` check).

            5. **Code quality and conventions**
               - Imports must use the `@/*` alias (maps to `src/*`). Flag relative `../../` paths beyond one level up.
               - Style: double quotes, no semicolons, no trailing commas, 2-space indent (enforced by Biome — flag only structural issues Biome won't catch).
               - Comments must explain *why*, not *what*. Flag comments that restate the code, are in non-English, or reference the current task/PR.
               - No dead code, unused imports, or commented-out code introduced by this PR.

            6. **E2E test coverage**
               - Every new MCP tool must have at least one E2E test in `e2e/<module>.test.ts` using `MCPClient` from `e2e/util.ts`.
               - Confirmation-flow tools need tests for both the preview path and the `confirm_transfer` execution path.
               - Tests must assert actual response shape — not just that no error was thrown.
               - Hardcoded private keys or real wallet addresses must not appear in test files.

            Comment format:
            - Use inline comments for specific line-level issues
            - Post one top-level summary comment at the end with overall verdict (Approve / Request Changes / Comment)
            - Label issues as: 🔴 Blocker / 🟡 Minor / 🟢 Suggestion

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
